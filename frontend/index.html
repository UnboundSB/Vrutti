<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vrutti Final Sync</title>
    <style>
        body { background: #1e1e1e; color: white; padding: 50px; }
        
        .editor-container { 
            position: relative; 
            width: 800px; 
            height: 500px; 
            background: #2d2d2d; 
        }

        /* RESET EVERYTHING: No margins, no borders, exact line-height */
        #proxy-input, #display-layer {
            position: absolute;
            top: 0; left: 0;
            width: 800px;
            height: 500px;
            padding: 20px; /* Internal padding */
            margin: 0;
            border: none;
            box-sizing: border-box;
            
            font-family: 'Courier New', Courier, monospace; 
            font-size: 18px;
            line-height: 24px; /* EXACTLY 24px */
            overflow: hidden;
        }

        #display-layer { z-index: 1; pointer-events: none; }

        #proxy-input {
            z-index: 2;
            background: transparent;
            /* DEBUG COLOR: Semi-transparent white */
            color: rgba(255, 255, 255, 0.5); 
            caret-color: white;
            outline: none;
            resize: none;
            white-space: pre; /* Use 'pre' instead of 'pre-wrap' for pixel-perfect sync */
        }
    </style>
</head>
<body>

    <div class="editor-container">
        <canvas id="display-layer" width="800" height="500"></canvas>
        <textarea id="proxy-input" spellcheck="false" autofocus></textarea>
    </div>

    <script>
        const canvas = document.getElementById('display-layer');
        const ctx = canvas.getContext('2d');
        const proxyInput = document.getElementById('proxy-input');
        const ws = new WebSocket("ws://localhost:8000/ws/editor");

        function renderCanvas(text) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // MATCH THE CSS EXACTLY
            ctx.font = "18px 'Courier New', Courier, monospace";
            ctx.textBaseline = "top";

            const lines = text.split('\n');
            const xPadding = 20;
            const yPadding = 20; 
            const lineHeight = 24;

            for (let i = 0; i < lines.length; i++) {
                // Draw blue C++ text
                ctx.fillStyle = "#9cdcfe";
                ctx.fillText(lines[i], xPadding, yPadding + (i * lineHeight));
            }
        }

        ws.onmessage = function(event) {
            const textFromCPP = event.data;
            
            // We only update if the text is actually different to prevent cursor jumping
            if (proxyInput.value !== textFromCPP) {
                const start = proxyInput.selectionStart;
                const end = proxyInput.selectionEnd;
                
                proxyInput.value = textFromCPP;
                
                // Restore selection
                proxyInput.setSelectionRange(start, end);
            }
            renderCanvas(textFromCPP);
        };

        proxyInput.addEventListener('input', function(e) {
            // If it's a deletion, let the keydown handler handle it
            if (e.inputType.includes('delete')) return;

            // Handle typing/pasting
            ws.send(JSON.stringify({
                "action": "insert",
                "index": proxyInput.selectionStart - (e.data ? e.data.length : 1),
                "text": e.data || (e.inputType === "insertLineBreak" ? "\n" : "")
            }));
        });

        proxyInput.addEventListener('keydown', function(e) {
            if (e.key === "Backspace" || e.key === "Delete") {
                e.preventDefault();
                
                let start = proxyInput.selectionStart;
                let end = proxyInput.selectionEnd;
                let delIdx = start;
                let delLen = end - start;

                if (start === end) {
                    delLen = 1;
                    if (e.key === "Backspace") {
                        if (start === 0) return;
                        delIdx = start - 1;
                    }
                }

                ws.send(JSON.stringify({
                    "action": "delete",
                    "index": delIdx,
                    "length": delLen
                }));

                // Predict cursor movement for smoother feel
                if (e.key === "Backspace" && start === end) {
                    proxyInput.setSelectionRange(start - 1, start - 1);
                }
            }
        });
    </script>
</body>
</html>
