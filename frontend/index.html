<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vrutti Final Proper</title>

<style>
body {
    background: #1e1e1e;
    padding: 50px;
    color: white;
}

/* Container handles spacing */
.editor-container {
    position: relative;
    width: 800px;
    height: 500px;
    background: #2d2d2d;

    padding: 20px;
    box-sizing: border-box;
}

/* Shared styles */
#proxy-input, #display-layer {
    position: absolute;
    top: 20px;
    left: 20px;

    width: 760px;
    height: 460px;

    margin: 0;
    border: none;
    box-sizing: border-box;

    font-family: Consolas, Menlo, monospace;
    font-size: 18px;
    line-height: 24px !important;

    letter-spacing: 0;
    tab-size: 4;

    overflow: hidden;
}

/* Canvas */
#display-layer {
    z-index: 1;
    pointer-events: none;
}

/* Textarea */
#proxy-input {
    z-index: 2;
    background: transparent;

    color: transparent;           /* 🔥 hide text */
    caret-color: white;

    outline: none;
    resize: none;

    white-space: pre;
    overflow-wrap: normal;

    font-variant-ligatures: none;
}

/* Optional: block selection highlight */
#proxy-input::selection {
    background: rgba(255,255,255,0.15);
}
</style>
</head>

<body>

<div class="editor-container">
    <canvas id="display-layer"></canvas>
    <textarea id="proxy-input" spellcheck="false" autofocus></textarea>
</div>

<script>
const canvas = document.getElementById("display-layer");
const ctx = canvas.getContext("2d");
const input = document.getElementById("proxy-input");

let textState = "";
let isRemote = false;

/* ---------------- DPI FIX ---------------- */
const dpr = window.devicePixelRatio || 1;

function resizeCanvas() {
    const w = 760;
    const h = 460;

    canvas.width = w * dpr;
    canvas.height = h * dpr;

    canvas.style.width = w + "px";
    canvas.style.height = h + "px";

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

resizeCanvas();

/* ---------------- RENDER ---------------- */
const lineHeight = 24;
const baselineOffset = 18; // critical alignment tweak

function render(text) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.font = "18px Consolas";
    ctx.textBaseline = "alphabetic";

    const lines = text.split("\n");

    for (let i = 0; i < lines.length; i++) {
        ctx.fillStyle = "#9cdcfe";

        ctx.fillText(
            lines[i],
            0,
            (i * lineHeight) + baselineOffset
        );
    }
}

/* ---------------- WS ---------------- */
const ws = new WebSocket("ws://localhost:8000/ws/editor");

ws.onmessage = (e) => {
    const serverText = e.data;

    if (serverText === textState) return;

    isRemote = true;

    const start = input.selectionStart;
    const end = input.selectionEnd;

    textState = serverText;
    input.value = serverText;

    input.setSelectionRange(start, end);

    render(serverText);

    isRemote = false;
};

/* ---------------- INSERT (Typing) ---------------- */
input.addEventListener("beforeinput", (e) => {
    if (isRemote) return;

    if (
        e.inputType === "insertText" ||
        e.inputType === "insertLineBreak"
        // insertFromPaste was removed here; handled separately for reliability
    ) {
        e.preventDefault();

        const start = input.selectionStart;
        const end = input.selectionEnd;
        const hasSelection = start !== end;

        // If text is highlighted when we type, command C++ to delete the highlight first
        if (hasSelection) {
            ws.send(JSON.stringify({
                action: "delete",
                index: start,
                length: end - start
            }));
        }

        let txt = e.data || "";
        if (e.inputType === "insertLineBreak") txt = "\n";

        const newText =
            textState.slice(0, start) +
            txt +
            textState.slice(end);

        textState = newText;
        input.value = newText;

        const cursor = start + txt.length;
        input.setSelectionRange(cursor, cursor);

        render(newText);

        ws.send(JSON.stringify({
            action: "insert",
            index: start,
            text: txt
        }));
    }
});

/* ---------------- DELETE ---------------- */
input.addEventListener("keydown", (e) => {
    if (isRemote) return;

    if (e.key !== "Backspace" && e.key !== "Delete") return;

    e.preventDefault();

    const start = input.selectionStart;
    const end = input.selectionEnd;

    let delStart = start;
    let delEnd = end;

    if (start === end) {
        if (e.key === "Backspace") {
            if (start === 0) return;
            delStart = start - 1;
        } else {
            delEnd = start + 1;
        }
    }

    const newText =
        textState.slice(0, delStart) +
        textState.slice(delEnd);

    textState = newText;
    input.value = newText;

    input.setSelectionRange(delStart, delStart);

    render(newText);

    ws.send(JSON.stringify({
        action: "delete",
        index: delStart,
        length: delEnd - delStart
    }));
});

/* ---------------- CLIPBOARD (Ctrl+C, Ctrl+X, Ctrl+V) ---------------- */

// 1. COPY (Ctrl+C): Just let the browser do its default behavior. No code needed!

// 2. CUT (Ctrl+X)
input.addEventListener("cut", (e) => {
    if (isRemote) return;
    e.preventDefault();

    const start = input.selectionStart;
    const end = input.selectionEnd;

    if (start !== end) {
        // Grab the text and put it in the OS clipboard
        const cutText = textState.slice(start, end);
        e.clipboardData.setData('text/plain', cutText);

        // Delete from local state
        const newText = textState.slice(0, start) + textState.slice(end);
        textState = newText;
        input.value = newText;

        // Move cursor and render
        input.setSelectionRange(start, start);
        render(newText);

        // Tell C++ to delete
        ws.send(JSON.stringify({
            action: "delete",
            index: start,
            length: end - start
        }));
    }
});

// 3. PASTE (Ctrl+V)
input.addEventListener("paste", (e) => {
    if (isRemote) return;
    e.preventDefault();

    // Get pasted text from the OS clipboard
    const pasteText = (e.clipboardData || window.clipboardData).getData('text');
    if (!pasteText) return;

    const start = input.selectionStart;
    const end = input.selectionEnd;
    const hasSelection = start !== end;

    // If you paste OVER highlighted text, tell C++ to delete the highlight first
    if (hasSelection) {
        ws.send(JSON.stringify({
            action: "delete",
            index: start,
            length: end - start
        }));
    }

    // Insert pasted text into local state
    const newText = textState.slice(0, start) + pasteText + textState.slice(end);
    textState = newText;
    input.value = newText;

    // Move cursor to the end of the pasted block and render
    const cursor = start + pasteText.length;
    input.setSelectionRange(cursor, cursor);
    render(newText);

    // Tell C++ to insert the pasted text
    ws.send(JSON.stringify({
        action: "insert",
        index: start,
        text: pasteText
    }));
});

/* ---------------- INIT ---------------- */
render("");
</script>

</body>
</html>
